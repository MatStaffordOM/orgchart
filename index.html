// -------- Actual Excel file generation --------
async function ensureXlsxReady() {
  if (typeof XLSX !== 'undefined') return true;
  for (let i = 0; i < 100; i++) {
    await new Promise(r => setTimeout(r, 100));
    if (typeof XLSX !== 'undefined') return true;
  }
  return false;
}

async function doExportExcel() {
  const ready = await ensureXlsxReady();
  if (!ready) {
    alert('The Excel library could not be loaded. Please check your internet connection and try again.');
    return;
  }

  const { rows: orgRows, maxT } = buildOrgChartRows();
  const dirRows = buildDirectoryRows();
  const wb = XLSX.utils.book_new();

  // ===== Sheet 1: Org Chart =====
  const orgAoA = orgRows.map((row, rIdx) => {
    return row.map(cell => {
      if (!cell) return '';
      if (cell.kind === 'header') return cell.value;
      if (cell.department) {
        // Department cell: "DEPT: <name>\n<headcount> people"
        let content = 'DEPT: ' + (cell.name || '');
        if (cell.totalCount > 0) {
          content += '\n' + cell.totalCount + ' ' + (cell.totalCount === 1 ? 'person' : 'people');
        }
        return content;
      }
      let content = cell.role || '';
      if (cell.vacant) content += '\nPosition Vacant';
      else if (cell.name) content += '\n' + cell.name;
      if (cell.directCount > 0) {
        content += '\n' + (cell.totalCount > cell.directCount
          ? `${cell.directCount}/${cell.totalCount} reports`
          : `${cell.directCount} report${cell.directCount === 1 ? '' : 's'}`);
      }
      return content;
    });
  });

  const ws1 = XLSX.utils.aoa_to_sheet(orgAoA);

  for (let r = 0; r < orgRows.length; r++) {
    for (let c = 0; c < maxT; c++) {
      const cellRef = XLSX.utils.encode_cell({ r, c });
      const cellData = orgRows[r][c];
      if (!ws1[cellRef]) ws1[cellRef] = { v: '', t: 's' };

      if (r === 0) {
        // Header row
        ws1[cellRef].s = {
          fill: { patternType: 'solid', fgColor: { rgb: '0B1F3A' } },
          font: { color: { rgb: 'FFFFFF' }, bold: true, name: 'Calibri', sz: 11 },
          alignment: { horizontal: 'left', vertical: 'center', indent: 1 },
          border: xlBorder('FFFFFF')
        };
      } else if (cellData) {
        const tierHex = tierColor(cellData.tier).replace('#', '');
        if (cellData.department) {
          // Department: navy fill with white/orange text
          ws1[cellRef].s = {
            fill: { patternType: 'solid', fgColor: { rgb: '152E54' } },
            font: { color: { rgb: 'FFFFFF' }, bold: true, name: 'Calibri', sz: 10 },
            alignment: { wrapText: true, vertical: 'top', horizontal: 'left', indent: 1 },
            border: {
              top: { style: 'thin', color: { rgb: '1D3E6F' } },
              bottom: { style: 'thin', color: { rgb: '1D3E6F' } },
              right: { style: 'thin', color: { rgb: '1D3E6F' } },
              left: { style: 'medium', color: { rgb: tierHex } }
            }
          };
        } else {
          // Role cell: light tier-tinted background
          const fill = lightenHex(tierHex, 0.90);
          ws1[cellRef].s = {
            fill: { patternType: 'solid', fgColor: { rgb: fill } },
            font: {
              color: { rgb: cellData.vacant ? '8FA3B8' : '0B1F3A' },
              bold: !cellData.vacant,
              italic: cellData.vacant,
              name: 'Calibri',
              sz: 10
            },
            alignment: { wrapText: true, vertical: 'top', horizontal: 'left', indent: 1 },
            border: {
              top: { style: 'thin', color: { rgb: 'E8EFF5' } },
              bottom: { style: 'thin', color: { rgb: 'E8EFF5' } },
              right: { style: 'thin', color: { rgb: 'E8EFF5' } },
              left: { style: 'medium', color: { rgb: tierHex } }
            }
          };
        }
      } else {
        // Empty cell
        ws1[cellRef].s = {
          fill: { patternType: 'solid', fgColor: { rgb: 'F4F6F9' } },
          border: xlBorder('E8EFF5')
        };
      }
    }
  }

  ws1['!cols'] = Array(maxT).fill({ wch: 32 });
  ws1['!rows'] = orgRows.map((r, i) => {
    if (i === 0) return { hpt: 28 };
    let maxLines = 1;
    r.forEach(cell => {
      if (cell && cell.kind === 'cell') {
        let lines = 1;
        if (cell.name || cell.vacant) lines++;
        if (cell.directCount > 0 || cell.department) lines++;
        if (lines > maxLines) maxLines = lines;
      }
    });
    return { hpt: 18 + maxLines * 14 };
  });
  ws1['!views'] = [{ state: 'frozen', ySplit: 1 }];

  XLSX.utils.book_append_sheet(wb, ws1, 'Org Chart');

  // ===== Sheet 2: Directory =====
  const dirAoA = dirRows.map(row => row.cells);
  const ws2 = XLSX.utils.aoa_to_sheet(dirAoA);
  const colCount = dirRows[0].cells.length;

  for (let r = 0; r < dirRows.length; r++) {
    for (let c = 0; c < colCount; c++) {
      const cellRef = XLSX.utils.encode_cell({ r, c });
      if (!ws2[cellRef]) ws2[cellRef] = { v: '', t: 's' };

      if (r === 0) {
        ws2[cellRef].s = {
          fill: { patternType: 'solid', fgColor: { rgb: '0B1F3A' } },
          font: { color: { rgb: 'FFFFFF' }, bold: true, name: 'Calibri', sz: 10 },
          alignment: { horizontal: 'left', vertical: 'center', indent: 1 },
          border: xlBorder('FFFFFF')
        };
      } else {
        const row = dirRows[r];
        const tierHex = tierColor(row.tier).replace('#', '');
        const isVacantRow = row.vacant;
        const isDeptRow = row.department;
        const bandFill = r % 2 === 0 ? 'FFFFFF' : 'F4F6F9';

        ws2[cellRef].s = {
          fill: { patternType: 'solid', fgColor: { rgb: bandFill } },
          font: {
            color: { rgb: isVacantRow ? 'B83410' : (isDeptRow ? 'E85C1A' : '0B1F3A') },
            italic: isVacantRow,
            bold: c === 2 || isDeptRow,
            name: 'Calibri',
            sz: 10
          },
          alignment: {
            wrapText: c === 8,
            vertical: 'top',
            horizontal: (c === 0 || c === 5 || c === 6) ? 'center' : 'left',
            indent: 1
          },
          border: xlBorder('E8EFF5')
        };

        // Tier column: solid tier-colour
        if (c === 0) {
          ws2[cellRef].s.fill = { patternType: 'solid', fgColor: { rgb: tierHex } };
          ws2[cellRef].s.font = { color: { rgb: 'FFFFFF' }, bold: true, name: 'Calibri', sz: 10 };
        }

        // Type column: bold for departments
        if (c === 1 && isDeptRow) {
          ws2[cellRef].s.font.color = { rgb: 'E85C1A' };
          ws2[cellRef].s.font.bold = true;
        }

        // Status column
        if (c === 7) {
          const status = row.cells[7];
          if (status === 'Vacant') {
            ws2[cellRef].s.font.color = { rgb: 'B83410' };
            ws2[cellRef].s.font.bold = true;
          } else if (status === 'Filled') {
            ws2[cellRef].s.font.color = { rgb: '1B8556' };
            ws2[cellRef].s.font.bold = true;
          } else if (status === 'Department') {
            ws2[cellRef].s.font.color = { rgb: 'E85C1A' };
            ws2[cellRef].s.font.bold = true;
          }
        }
      }
    }
  }

  ws2['!cols'] = [
    { wch: 10 }, // Tier
    { wch: 12 }, // Type
    { wch: 32 }, // Role / Dept
    { wch: 22 }, // Name
    { wch: 30 }, // Reports To
    { wch: 16 }, // Direct
    { wch: 14 }, // Total
    { wch: 13 }, // Status
    { wch: 44 }  // Notes
  ];
  ws2['!rows'] = dirRows.map((r, i) => ({ hpt: i === 0 ? 26 : 24 }));
  ws2['!views'] = [{ state: 'frozen', ySplit: 1 }];

  XLSX.utils.book_append_sheet(wb, ws2, 'Directory');

  // Write file
  const dateStr = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `PFi-Org-Chart-${dateStr}.xlsx`);
}

// -------- Event delegation --------
document.addEventListener('click', (e) => {
  // Outside-menu clicks close the open dropdown
  const inMenu = e.target.closest('.card-menu-dropdown');
  const onMenuBtn = e.target.closest('[data-action="toggle-menu"]');
  if (openMenuId && !inMenu && !onMenuBtn) {
    openMenuId = null;
    render();
  }

  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const id = actionEl.dataset.id;

  switch (action) {
    case 'toggle-menu':
      e.stopPropagation();
      openMenuId = (openMenuId === id) ? null : id;
      render();
      break;

    case 'edit':
      // Card body clicks (name/role/notes) shouldn't fire when the menu button is clicked
      if (e.target.closest('[data-action="toggle-menu"]')) return;
      if (e.target.closest('.card-collapse')) return;
      openMenuId = null;
      openEditModal(id);
      break;

    case 'add-child':
      openMenuId = null;
      openAddModal({ parentId: id, type: 'child', nodeType: 'role' });
      break;

    case 'add-department':
      openMenuId = null;
      openAddModal({ parentId: id, type: 'child', nodeType: 'department' });
      break;

    case 'add-sibling': {
      if (actionEl.disabled) return;
      const node = state.nodes[id];
      if (!node || !node.parentId) return;
      openMenuId = null;
      // Adding a peer of a department creates another department; peer of a role creates a role
      openAddModal({ parentId: id, type: 'sibling', nodeType: isDepartment(node) ? 'department' : 'role' });
      break;
    }

    case 'delete':
      openMenuId = null;
      openDeleteConfirm(id);
      break;

    case 'confirm-delete':
      deleteNode(id);
      closeModal();
      break;

    case 'collapse':
      e.stopPropagation();
      toggleCollapse(id);
      break;

    case 'close-modal':
      closeModal();
      break;

    case 'save-edit':
      saveEditFromModal(id);
      break;

    case 'save-add':
      saveAddFromModal(actionEl.dataset.parentId || null, actionEl.dataset.nodeType || 'role');
      break;

    case 'add-root':
      openAddModal({ parentId: null, type: 'root', nodeType: 'role' });
      break;

    case 'open-versions':
      openVersionsModal();
      break;

    case 'save-current-version':
      handleSaveCurrentVersion();
      break;

    case 'confirm-load-version':
      handleConfirmLoadVersion(actionEl.dataset.versionId);
      break;

    case 'do-load-version':
      if (loadVersion(actionEl.dataset.versionId)) {
        closeModal();
      }
      break;

    case 'confirm-delete-version':
      handleConfirmDeleteVersion(actionEl.dataset.versionId);
      break;

    case 'do-delete-version':
      deleteVersion(actionEl.dataset.versionId);
      // Re-open the versions modal to show the updated list
      openVersionsModal();
      break;

    case 'toggle-lang-menu': {
      e.stopPropagation();
      const btn = document.getElementById('lang-btn');
      const dd = document.getElementById('lang-dropdown');
      if (!btn || !dd) break;
      const opening = !dd.classList.contains('is-open');
      if (opening) renderLanguageDropdown();
      btn.classList.toggle('is-open', opening);
      dd.classList.toggle('is-open', opening);
      break;
    }

    case 'select-language':
      switchLanguage(actionEl.dataset.lang);
      break;

    case 'change-logo':
      e.stopPropagation();
      closeBrandMenu();
      document.getElementById('logo-input').click();
      break;

    case 'remove-logo':
      e.stopPropagation();
      closeBrandMenu();
      resetCustomLogo();
      break;

    case 'open-settings':
      openSettingsModal();
      break;

    case 'save-tier-colors':
      saveTierColorsFromModal();
      break;

    case 'reset-tier-colors':
      resetTierColorsFromModal();
      break;

    case 'open-vacancies':
      openVacanciesModal();
      break;

    case 'focus-node':
      focusNodeInChart(actionEl.dataset.id);
      break;

    case 'seed-default':
      seedDefault();
      render();
      break;

    case 'expand-all':
      expandAll();
      break;

    case 'collapse-all':
      collapseAll();
      break;

    case 'export':
      exportJson();
      break;

    case 'export-excel':
      openExportPreviewModal();
      break;

    case 'switch-export-tab':
      switchExportTab(actionEl.dataset.tab);
      break;

    case 'confirm-export-excel': {
      // Show "preparing" state on the button
      const btn = actionEl;
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span>Preparing\u2026</span>';
      doExportExcel().finally(() => {
        btn.disabled = false;
        btn.innerHTML = original;
        closeModal();
      });
      break;
    }

    case 'import':
      document.getElementById('file-input').click();
      break;

    case 'reset':
      openResetConfirm();
      break;

    case 'confirm-reset':
      seedDefault();
      render();
      closeModal();
      break;
  }
});

// Close menus on overlay click (but not on modal content)
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (modalOverlay.classList.contains('is-open')) {
      closeModal();
    } else if (openMenuId) {
      openMenuId = null;
      render();
    }
  }
  // Cmd/Ctrl+Enter to submit form in modal
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && modalOverlay.classList.contains('is-open')) {
    const saveBtn = modalOverlay.querySelector('[data-action="save-edit"], [data-action="save-add"], [data-action="confirm-delete"], [data-action="confirm-reset"]');
    if (saveBtn) saveBtn.click();
  }
});

// File input
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) importJson(file);
  e.target.value = '';
});

// Logo input
document.getElementById('logo-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) uploadCustomLogo(file);
  e.target.value = '';
});

// Brand area click: open menu if a logo is set, file picker if not
document.getElementById('brand-area').addEventListener('click', (e) => {
  // Clicks inside the menu have their own data-action handlers — don't double-fire
  if (e.target.closest('.brand-menu')) return;
  const brand = document.getElementById('brand-area');
  if (brand.classList.contains('has-logo')) {
    const menu = document.getElementById('brand-menu');
    if (menu.classList.contains('is-open')) {
      closeBrandMenu();
    } else {
      e.stopPropagation();
      openBrandMenu();
    }
  } else {
    document.getElementById('logo-input').click();
  }
});

// Outside-click closes both the lang dropdown and the brand menu
document.addEventListener('click', (e) => {
  if (!e.target.closest('.lang-switcher')) {
    document.getElementById('lang-dropdown')?.classList.remove('is-open');
    document.getElementById('lang-btn')?.classList.remove('is-open');
  }
  if (!e.target.closest('#brand-area')) {
    closeBrandMenu();
  }
});

// ============================================================
//   DRAG & DROP
// ============================================================
const dragState = {
  draggedId: null,
  dropTargetId: null,
  dropMode: null   // 'child' | 'before' | 'after' | null
};

const canvas = document.getElementById('canvas');
const dragHint = document.getElementById('drag-hint');
let scrollInterval = null;

canvas.addEventListener('dragstart', (e) => {
  // Don't initiate drag from interactive sub-elements
  if (e.target.closest('.card-menu-btn') ||
      e.target.closest('.card-menu-dropdown') ||
      e.target.closest('.card-collapse') ||
      e.target.closest('.card-reports-badge')) {
    e.preventDefault();
    return;
  }

  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const node = state.nodes[id];
  if (!node || !node.parentId) {
    // Root can't be dragged
    e.preventDefault();
    return;
  }

  // Close any open menu before dragging
  if (openMenuId) {
    openMenuId = null;
    render();
  }

  dragState.draggedId = id;
  try {
    e.dataTransfer.setData('text/plain', id);
    e.dataTransfer.effectAllowed = 'move';
  } catch (_) { /* some browsers */ }

  // Defer the dragging-class so the browser captures the card image first
  requestAnimationFrame(() => {
    const stillThere = document.querySelector(`.card[data-id="${id}"]`);
    if (stillThere && dragState.draggedId === id) {
      stillThere.classList.add('is-being-dragged');
    }
    document.body.classList.add('is-dragging');
  });
});

canvas.addEventListener('dragover', (e) => {
  if (!dragState.draggedId) return;
  handleAutoScroll(e);

  const card = e.target.closest('.card');
  if (!card) {
    setDropTarget(null, null);
    hideHint();
    return;
  }

  const targetId = card.dataset.id;
  const draggedId = dragState.draggedId;
  if (!targetId || !state.nodes[targetId]) {
    setDropTarget(null, null);
    hideHint();
    return;
  }

  // Invalid targets: self or any descendant of dragged (would create a cycle)
  if (targetId === draggedId || getDescendantIds(draggedId).includes(targetId)) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'none';
    setDropTarget(null, null);
    showHint(e, 'Can\u2019t drop here', true);
    return;
  }

  // Determine drop zone based on cursor Y within the card
  const rect = card.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const h = rect.height;
  const targetNode = state.nodes[targetId];
  const targetIsRoot = !targetNode.parentId;

  let mode;
  if (targetIsRoot) {
    mode = 'child'; // only valid drop on root is "become its child"
  } else if (y < h * 0.30) {
    mode = 'before';
  } else if (y > h * 0.70) {
    mode = 'after';
  } else {
    mode = 'child';
  }

  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  setDropTarget(targetId, mode);

  // Hint text describing what the drop will do
  const draggedNode = state.nodes[draggedId];
  const draggedLabel = (draggedNode.name || draggedNode.role || 'role').trim();
  const targetLabel = (targetNode.name || targetNode.role || 'role').trim();
  let hintText;
  if (mode === 'child') {
    hintText = `Move under <span class="accent">${escapeHtml(targetLabel)}</span>`;
  } else if (mode === 'before') {
    hintText = `Place above <span class="accent">${escapeHtml(targetLabel)}</span>`;
  } else {
    hintText = `Place below <span class="accent">${escapeHtml(targetLabel)}</span>`;
  }
  showHint(e, hintText, false);
});

canvas.addEventListener('drop', (e) => {
  if (!dragState.draggedId) return;
  e.preventDefault();
  const { draggedId, dropTargetId, dropMode } = dragState;
  if (dropTargetId && dropMode) {
    moveNode(draggedId, { type: dropMode, refId: dropTargetId });
  }
  endDrag();
});

canvas.addEventListener('dragend', () => {
  endDrag();
});

// Cancel drag if user releases over modal or off-canvas
document.addEventListener('dragend', () => {
  endDrag();
});

function setDropTarget(targetId, mode) {
  if (dragState.dropTargetId === targetId && dragState.dropMode === mode) return;
  clearDropIndicators();
  dragState.dropTargetId = targetId;
  dragState.dropMode = mode;
  if (!targetId || !mode) return;

  const targetCard = document.querySelector(`.card[data-id="${targetId}"]`);
  if (!targetCard) return;
  if (mode === 'child') targetCard.classList.add('is-drop-child');
  else if (mode === 'before') targetCard.classList.add('is-drop-before');
  else if (mode === 'after') targetCard.classList.add('is-drop-after');
}

function clearDropIndicators() {
  document.querySelectorAll('.is-drop-child, .is-drop-before, .is-drop-after')
    .forEach(el => el.classList.remove('is-drop-child', 'is-drop-before', 'is-drop-after'));
}

function showHint(e, html, invalid) {
  dragHint.innerHTML = html;
  dragHint.classList.toggle('is-invalid', !!invalid);
  dragHint.classList.add('is-visible');
  dragHint.style.left = e.clientX + 'px';
  dragHint.style.top = e.clientY + 'px';
}

function hideHint() {
  dragHint.classList.remove('is-visible');
}

function handleAutoScroll(e) {
  const rect = canvas.getBoundingClientRect();
  const edge = 90;
  const speed = 14;
  let dx = 0, dy = 0;

  if (e.clientX < rect.left + edge) dx = -speed;
  else if (e.clientX > rect.right - edge) dx = speed;

  if (e.clientY < rect.top + edge) dy = -speed;
  else if (e.clientY > rect.bottom - edge) dy = speed;

  if (dx === 0 && dy === 0) {
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
    return;
  }

  if (!scrollInterval) {
    scrollInterval = setInterval(() => {
      canvas.scrollLeft += dx;
      canvas.scrollTop += dy;
    }, 16);
  }
}

function endDrag() {
  clearDropIndicators();
  hideHint();
  document.body.classList.remove('is-dragging');
  document.querySelectorAll('.is-being-dragged')
    .forEach(el => el.classList.remove('is-being-dragged'));
  dragState.draggedId = null;
  dragState.dropTargetId = null;
  dragState.dropMode = null;
  if (scrollInterval) {
    clearInterval(scrollInterval);
    scrollInterval = null;
  }
}

// Cancel drag on Escape (some browsers don't fire dragend reliably on Escape)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && dragState.draggedId) {
    endDrag();
  }
});

// -------- Init --------
// Locale-aware initialization for multicontinental use.
// 1. detectLanguage() reads the user's preferred language from
//    navigator.languages (which is sourced from OS settings on
//    Windows/macOS/Linux — display language, keyboard region, etc.)
//    falling back to Intl.DateTimeFormat locale, then English.
// 2. applyStaticTranslations() swaps all [data-i18n] elements
//    (toolbar buttons, header labels, save status) to the detected language.
// 3. renderLanguageDropdown() populates the language switcher so users
//    can override the auto-detection.
// 4. applyCustomLogo() restores any previously-uploaded PNG/JPG/SVG logo.
currentLang = detectLanguage();
applyDirection();
applyStaticTranslations();
renderLanguageDropdown();
applyCustomLogo();
if (!loadState()) {
  seedDefault();
}
render();
</script>
