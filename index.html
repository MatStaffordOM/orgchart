<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFi · Organisation Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #0B1F3A;
    --navy-mid: #152E54;
    --navy-light: #1D3E6F;
    --orange-core: #E85C1A;
    --orange-light: #FF7535;
    --orange-hover: #D14F12;
    --silver: #8FA3B8;
    --mist: #C8D8E8;
    --fog: #E8EFF5;
    --off-white: #F4F6F9;
    --white: #FFFFFF;
    --danger: #B83410;
    --danger-bg: #FBEEE7;

    --tier-1: var(--orange-core);
    --tier-2: var(--orange-light);
    --tier-3: var(--navy-light);
    --tier-4: var(--navy-mid);
    --tier-5: var(--navy-deep);
    --tier-6: var(--silver);

    --line: var(--mist);

    --header-h: 64px;
    --toolbar-h: 60px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: var(--navy-deep);
    background: var(--off-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  button {
    font-family: inherit;
  }

  /* ============ HEADER ============ */
  .app-header {
    height: var(--header-h);
    background: var(--navy-deep);
    color: var(--white);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    position: relative;
    z-index: 10;
  }

  .app-header::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: var(--orange-core);
    opacity: 0.85;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand-mark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand-mark span {
    color: var(--orange-core);
  }

  .brand-divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.18);
    align-self: center;
  }

  .brand-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--mist);
    text-transform: uppercase;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-left: auto;
  }

  .stat-group {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    color: var(--white);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: var(--silver);
    text-transform: uppercase;
  }

  .save-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--silver);
    text-transform: uppercase;
  }

  .save-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange-core);
    box-shadow: 0 0 0 0 rgba(232, 92, 26, 0.6);
    transition: background 0.2s;
  }

  .save-status.saving .dot {
    background: var(--orange-light);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ============ TOOLBAR ============ */
  .toolbar {
    height: var(--toolbar-h);
    background: var(--white);
    border-bottom: 1px solid var(--fog);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 9;
  }

  .toolbar-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--silver);
  }

  .tier-legend {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .tier-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--navy-mid);
    text-transform: uppercase;
  }

  .tier-pill-swatch {
    width: 14px;
    height: 4px;
    border-radius: 1px;
  }

  .toolbar-divider {
    width: 1px;
    height: 22px;
    background: var(--fog);
    margin: 0 4px;
  }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ============ BUTTONS ============ */
  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    line-height: 1;
    padding: 9px 14px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
    white-space: nowrap;
    user-select: none;
  }

  .btn svg {
    width: 13px;
    height: 13px;
  }

  .btn-primary {
    background: var(--orange-core);
    color: var(--white);
  }

  .btn-primary:hover {
    background: var(--orange-hover);
  }

  .btn-outline {
    background: transparent;
    color: var(--navy-deep);
    border: 1.5px solid var(--mist);
  }

  .btn-outline:hover {
    border-color: var(--navy-deep);
    background: var(--navy-deep);
    color: var(--white);
  }

  .btn-outline-orange {
    background: transparent;
    color: var(--orange-core);
    border: 1.5px solid var(--orange-core);
  }

  .btn-outline-orange:hover {
    background: var(--orange-core);
    color: var(--white);
  }

  .btn-ghost {
    background: transparent;
    color: var(--navy-mid);
    border: 1px solid transparent;
  }

  .btn-ghost:hover {
    background: var(--off-white);
    color: var(--navy-deep);
  }

  .btn-danger {
    background: var(--danger);
    color: var(--white);
  }

  .btn-danger:hover {
    background: #951F03;
  }

  /* ============ CANVAS / CHART ============ */
  .canvas {
    overflow: auto;
    height: calc(100vh - var(--header-h) - var(--toolbar-h));
    padding: 56px;
    background-color: var(--off-white);
    background-image: radial-gradient(circle, var(--fog) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: 0 0;
  }

  .canvas::-webkit-scrollbar {
    width: 14px;
    height: 14px;
  }

  .canvas::-webkit-scrollbar-track {
    background: transparent;
  }

  .canvas::-webkit-scrollbar-thumb {
    background: var(--mist);
    border: 4px solid var(--off-white);
    border-radius: 7px;
  }

  .canvas::-webkit-scrollbar-thumb:hover {
    background: var(--silver);
  }

  .chart {
    display: inline-flex;
    align-items: flex-start;
    min-width: 100%;
    padding-right: 80px;
    padding-bottom: 80px;
  }

  /* ============ TREE / NODES ============ */
  .node {
    display: flex;
    align-items: center;
    position: relative;
  }

  .children {
    display: flex;
    flex-direction: column;
    gap: 22px;
    padding-left: 56px;
    position: relative;
  }

  /* Horizontal connector from trunk line into each child card */
  .children > .node::before {
    content: '';
    position: absolute;
    left: -28px;
    top: 50%;
    width: 28px;
    height: 1.5px;
    background: var(--line);
  }

  /* Vertical trunk passing through each child position */
  .children > .node::after {
    content: '';
    position: absolute;
    left: -28px;
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: var(--line);
  }

  /* First child: trunk only from middle downward */
  .children > .node:first-child::after {
    top: 50%;
    bottom: 0;
  }

  /* Last child: trunk only from top to middle */
  .children > .node:last-child::after {
    top: 0;
    height: 50%;
    bottom: auto;
  }

  /* Only child: no vertical trunk, horizontal connector only */
  .children > .node:only-child::after {
    display: none;
  }

  /* Stub on parent card going right toward children */
  .node.has-children > .card-wrap::after {
    content: '';
    position: absolute;
    right: -28px;
    top: 50%;
    width: 28px;
    height: 1.5px;
    background: var(--line);
    z-index: 0;
  }

  .card-wrap {
    position: relative;
    display: inline-block;
  }

  /* ============ CARD ============ */
  .card {
    background: var(--white);
    border: 1px solid var(--fog);
    border-top: 4px solid var(--tier-color, var(--orange-core));
    border-radius: 4px;
    padding: 14px 16px 14px;
    width: 244px;
    position: relative;
    transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    z-index: 1;
  }

  .card:hover {
    box-shadow: 0 8px 24px -10px rgba(11, 31, 58, 0.22);
    transform: translateY(-1px);
  }

  .card.is-collapsed {
    border-right: 4px solid var(--tier-color, var(--orange-core));
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 8px;
  }

  .card-tier {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: var(--tier-color, var(--orange-core));
    text-transform: uppercase;
  }

  .card-menu-btn {
    background: transparent;
    border: none;
    color: var(--silver);
    cursor: pointer;
    padding: 4px;
    margin: -4px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
  }

  .card-menu-btn:hover {
    color: var(--navy-deep);
    background: var(--off-white);
  }

  .card-menu-btn svg {
    width: 16px;
    height: 16px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
    color: var(--navy-deep);
    margin-bottom: 3px;
    line-height: 1.22;
    word-wrap: break-word;
  }

  .card-name.is-empty {
    color: var(--silver);
    font-weight: 700;
    font-style: italic;
  }

  .card-role {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--navy-mid);
    line-height: 1.38;
    word-wrap: break-word;
  }

  .card-notes {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--fog);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    cursor: pointer;
    transition: color 0.12s ease;
  }

  .card-notes:hover .card-notes-text {
    color: var(--navy-deep);
  }

  .card-notes svg {
    width: 11px;
    height: 11px;
    margin-top: 3px;
    flex-shrink: 0;
    color: var(--orange-core);
  }

  .card-notes-text {
    font-size: 11px;
    color: var(--silver);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color 0.12s ease;
  }

  /* Direct-reports count badge in the bottom-right corner */
  .card-reports-badge {
    position: absolute;
    bottom: -10px;
    right: 14px;
    min-width: 26px;
    height: 22px;
    padding: 0 8px;
    border-radius: 11px;
    background: var(--tier-color, var(--orange-core));
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.02em;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    white-space: nowrap;
    border: 2px solid var(--white);
    box-shadow: 0 3px 8px -3px rgba(11, 31, 58, 0.32);
    z-index: 2;
    transition: transform 0.15s ease;
    cursor: default;
  }

  .card-reports-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.85);
    flex-shrink: 0;
  }

  /* When reports bubbled up from a vacant role below, the badge gets a subtle
     upward chevron mark to signal the bubble-up. */
  .card-reports-badge.is-bubbled::before {
    width: 0;
    height: 0;
    border-radius: 0;
    background: transparent;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 5px solid rgba(255, 255, 255, 0.95);
    margin-right: 1px;
  }

  .card:hover + .card-reports-badge,
  .card-wrap:hover .card-reports-badge {
    transform: translateY(-1px);
  }

  /* Vacant role state — diagonal hatch + muted name */
  .card.is-vacant {
    background:
      repeating-linear-gradient(
        135deg,
        var(--white) 0,
        var(--white) 10px,
        var(--off-white) 10px,
        var(--off-white) 12px
      );
  }

  .card.is-vacant .card-name {
    color: var(--silver);
    font-style: italic;
  }

  .card.is-vacant .card-role {
    color: var(--silver);
  }

  .tier-vacant {
    color: var(--danger);
    font-weight: 700;
    letter-spacing: 0.14em;
  }

  /* Collapse toggle button on right edge of card */
  .card-collapse {
    position: absolute;
    right: -11px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--white);
    border: 1.5px solid var(--mist);
    color: var(--navy-mid);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    line-height: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: all 0.15s ease;
    padding: 0;
  }

  .card-collapse:hover {
    background: var(--navy-deep);
    color: var(--white);
    border-color: var(--navy-deep);
  }

  .card-collapse-count {
    position: absolute;
    right: -32px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 9.5px;
    letter-spacing: 0.08em;
    color: var(--silver);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
  }

  .card.is-collapsed + .card-collapse-count,
  .card-wrap.is-collapsed .card-collapse-count {
    color: var(--orange-core);
  }

  /* Card dropdown menu */
  .card-menu-dropdown {
    position: absolute;
    top: 38px;
    right: 12px;
    background: var(--white);
    border: 1px solid var(--fog);
    border-radius: 4px;
    box-shadow: 0 14px 36px -10px rgba(11, 31, 58, 0.32);
    min-width: 200px;
    padding: 4px;
    z-index: 50;
    animation: menuIn 0.12s ease;
  }

  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    background: transparent;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--navy-deep);
    padding: 8px 10px;
    border-radius: 3px;
    cursor: pointer;
    text-align: left;
    transition: background 0.1s ease;
  }

  .menu-item:hover {
    background: var(--off-white);
  }

  .menu-item.danger {
    color: var(--danger);
  }

  .menu-item.danger:hover {
    background: var(--danger-bg);
  }

  .menu-item:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .menu-item svg {
    width: 13px;
    height: 13px;
    color: var(--silver);
    flex-shrink: 0;
  }

  .menu-item:hover svg {
    color: var(--navy-deep);
  }

  .menu-item.danger svg {
    color: var(--danger);
  }

  .menu-divider {
    height: 1px;
    background: var(--fog);
    margin: 4px 6px;
  }

  /* ============ EMPTY STATE ============ */
  .empty-state {
    width: 100%;
    text-align: center;
    padding: 80px 40px;
  }

  .empty-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange-core);
    margin-bottom: 12px;
  }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: var(--navy-deep);
    margin-bottom: 10px;
  }

  .empty-title em {
    color: var(--orange-core);
    font-style: italic;
  }

  .empty-text {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--silver);
    max-width: 440px;
    margin: 0 auto 28px;
    line-height: 1.55;
  }

  .empty-actions {
    display: inline-flex;
    gap: 10px;
  }

  /* ============ MODAL ============ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 31, 58, 0.55);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: overlayIn 0.15s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-overlay.is-open {
    display: flex;
  }

  .modal {
    background: var(--white);
    border-radius: 4px;
    border-top: 4px solid var(--orange-core);
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 28px 70px -14px rgba(11, 31, 58, 0.55);
    animation: modalIn 0.18s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal.tier-themed {
    border-top-color: var(--modal-tier-color, var(--orange-core));
  }

  .modal-header {
    padding: 24px 28px 6px;
  }

  .modal-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--modal-tier-color, var(--orange-core));
    margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--navy-deep);
    line-height: 1.2;
  }

  .modal-title em {
    color: var(--orange-core);
    font-style: italic;
  }

  .modal-body {
    padding: 18px 28px 22px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group:last-child {
    margin-bottom: 0;
  }

  .form-label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--navy-mid);
    margin-bottom: 7px;
  }

  .form-input, .form-textarea {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--navy-deep);
    background: var(--off-white);
    border: 1.5px solid var(--fog);
    border-radius: 4px;
    padding: 10px 12px;
    transition: all 0.15s ease;
    line-height: 1.45;
  }

  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--navy-light);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(29, 62, 111, 0.08);
  }

  .form-textarea {
    min-height: 110px;
    resize: vertical;
    font-family: 'Inter', sans-serif;
  }

  .form-help {
    font-size: 11px;
    color: var(--silver);
    margin-top: 5px;
    line-height: 1.4;
  }

  .modal-footer {
    padding: 16px 28px 22px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    border-top: 1px solid var(--fog);
  }

  /* Confirm modal */
  .confirm-modal {
    max-width: 440px;
  }

  .confirm-modal .modal-body {
    padding: 4px 28px 22px;
  }

  .confirm-message {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: var(--navy-mid);
  }

  .confirm-message strong {
    color: var(--navy-deep);
    font-weight: 700;
  }

  .confirm-warning {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--danger-bg);
    border-left: 3px solid var(--danger);
    border-radius: 0 3px 3px 0;
    font-size: 12px;
    color: var(--danger);
    line-height: 1.5;
  }

  /* Responsive tweaks */
  @media (max-width: 720px) {
    .app-header { padding: 0 16px; }
    .toolbar { padding: 0 16px; flex-wrap: wrap; height: auto; padding-top: 12px; padding-bottom: 12px; gap: 10px; }
    .canvas { padding: 28px; height: calc(100vh - var(--header-h) - 100px); }
    .header-meta { gap: 14px; }
    .stat-group { display: none; }
    .stat-group:first-child { display: flex; }
    .tier-legend { gap: 10px; }
    .tier-pill { font-size: 9px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">PF<span>i</span></div>
    <div class="brand-divider"></div>
    <div class="brand-title">Organisation Chart</div>
  </div>
  <div class="header-meta">
    <div class="stat-group">
      <span class="stat-num" id="stat-tiers">0</span>
      <span class="stat-label">Tiers</span>
    </div>
    <div class="stat-group">
      <span class="stat-num" id="stat-roles">0</span>
      <span class="stat-label">Roles</span>
    </div>
    <div class="save-status" id="save-status">
      <span class="dot"></span>
      <span class="save-text">Saved locally</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-eyebrow">Tier Key</span>
  <div class="tier-legend" id="tier-legend"></div>
  <div class="toolbar-right">
    <button class="btn btn-ghost" data-action="expand-all">Expand all</button>
    <button class="btn btn-ghost" data-action="collapse-all">Collapse all</button>
    <div class="toolbar-divider"></div>
    <button class="btn btn-outline" data-action="export">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M4 7l4 4 4-4M2 13.5h12"/></svg>
      Export
    </button>
    <button class="btn btn-outline" data-action="import">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V2M4 6l4-4 4 4M2 13.5h12"/></svg>
      Import
    </button>
    <button class="btn btn-outline" data-action="reset">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1011-3"/><path d="M13.5 2v4h-4"/></svg>
      Reset
    </button>
    <input type="file" id="file-input" accept="application/json,.json" style="display:none">
  </div>
</div>

<main class="canvas" id="canvas">
  <div class="chart" id="chart"></div>
</main>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true"></div>

<script>
// ============================================================
//   PFi Organisation Chart
//   Self-contained · localStorage-backed · style-guide compliant
// ============================================================

const STORAGE_KEY = 'pfi_org_chart_v1';

// -------- Icons (inline SVG, no emoji per style guide) --------
const ICONS = {
  menu: '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/></svg>',
  edit: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg>',
  addChild: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h4l2 2h4v6.5H3z"/><path d="M9 9v3M7.5 10.5h3"/></svg>',
  addSibling: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.5" width="12" height="4" rx="0.5"/><rect x="2" y="9.5" width="8" height="4" rx="0.5"/><path d="M13 10.5v3M11.5 12h3"/></svg>',
  trash: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2.5h4V4M4.5 4l.7 9.5h5.6L11.5 4"/></svg>',
  note: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2h7l3 3v9H3z"/><path d="M5 7h6M5 10h4"/></svg>',
  plus: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v10M3 8h10"/></svg>'
};

// -------- Tier colour assignment (style-guide compliant) --------
// Top of hierarchy = warmest (orange). Deeper tiers = navy → silver.
const TIER_COLORS = [
  '#E85C1A', // Tier 1 — Orange Core
  '#FF7535', // Tier 2 — Orange Light
  '#1D3E6F', // Tier 3 — Navy Light
  '#152E54', // Tier 4 — Navy Mid
  '#0B1F3A', // Tier 5 — Deep Navy
  '#8FA3B8'  // Tier 6+ — Silver
];

function tierColor(tier) {
  return TIER_COLORS[Math.min(tier - 1, TIER_COLORS.length - 1)];
}

// -------- State --------
let state = {
  nodes: {},        // id -> { id, name, role, notes, tier, parentId }
  rootId: null,
  collapsed: {}     // id -> true
};

let openMenuId = null;

function genId() {
  return 'n_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function escapeHtml(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getChildren(parentId) {
  return Object.values(state.nodes)
    .filter(n => n.parentId === parentId)
    .sort((a, b) => (a.order || 0) - (b.order || 0));
}

function getDescendantIds(id) {
  const out = [];
  const stack = getChildren(id).map(c => c.id);
  while (stack.length) {
    const cid = stack.pop();
    out.push(cid);
    getChildren(cid).forEach(c => stack.push(c.id));
  }
  return out;
}

function maxTier() {
  return Math.max(0, ...Object.values(state.nodes).map(n => n.tier));
}

// -------- Vacancy logic --------
// A role is "vacant" when its name reads "Position Vacant" or "Vacant Position"
// (case-insensitive, whitespace-tolerant). When a role is vacant, its team
// effectively reports to the manager above, so we bubble those reports up.
function isVacant(node) {
  if (!node || !node.name) return false;
  const normalized = node.name.trim().toLowerCase().replace(/\s+/g, ' ');
  return normalized === 'position vacant' || normalized === 'vacant position';
}

// Effective direct-report count:
//   - Filled child counts as 1
//   - Vacant child contributes its own effective count (recursive bubble-up)
// Returns 0 if the node itself is vacant (no manager to manage anyone).
function effectiveDirectReports(nodeId) {
  const node = state.nodes[nodeId];
  if (!node || isVacant(node)) return 0;
  return _bubbledReportsBelow(nodeId);
}

function _bubbledReportsBelow(nodeId) {
  let total = 0;
  for (const kid of getChildren(nodeId)) {
    if (isVacant(kid)) {
      total += _bubbledReportsBelow(kid.id);
    } else {
      total += 1;
    }
  }
  return total;
}

function hasVacantDirectChild(nodeId) {
  return getChildren(nodeId).some(k => isVacant(k));
}

// -------- Persistence --------
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.nodes && parsed.rootId) {
        state = {
          nodes: parsed.nodes,
          rootId: parsed.rootId,
          collapsed: parsed.collapsed || {}
        };
        return true;
      }
    }
  } catch (e) {
    console.warn('Load failed:', e);
  }
  return false;
}

let saveTimer = null;
function saveState() {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSaveStatus('saved');
    } catch (e) {
      console.warn('Save failed:', e);
      setSaveStatus('error');
    }
  }, 200);
}

function setSaveStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.classList.remove('saving', 'error');
  const txt = el.querySelector('.save-text');
  if (s === 'saving') {
    el.classList.add('saving');
    if (txt) txt.textContent = 'Saving…';
  } else if (s === 'error') {
    el.classList.add('error');
    if (txt) txt.textContent = 'Save failed';
  } else {
    if (txt) txt.textContent = 'Saved locally';
  }
}

// -------- CRUD --------
function _createNode({ parentId, name, role, notes }) {
  const id = genId();
  const tier = parentId ? state.nodes[parentId].tier + 1 : 1;
  const siblings = getChildren(parentId);
  state.nodes[id] = {
    id,
    name: name || '',
    role: role || '',
    notes: notes || '',
    tier,
    parentId: parentId || null,
    order: siblings.length
  };
  if (!parentId && !state.rootId) state.rootId = id;
  return id;
}

function addNode(opts) {
  const id = _createNode(opts);
  if (opts.parentId) state.collapsed[opts.parentId] = false;
  saveState();
  render();
  return id;
}

function updateNode(id, updates) {
  if (!state.nodes[id]) return;
  state.nodes[id] = { ...state.nodes[id], ...updates };
  saveState();
  render();
}

function deleteNode(id) {
  if (!state.nodes[id]) return;
  const descendants = getDescendantIds(id);
  [id, ...descendants].forEach(nid => {
    delete state.nodes[nid];
    delete state.collapsed[nid];
  });
  if (state.rootId === id) state.rootId = null;
  saveState();
  render();
}

function toggleCollapse(id) {
  state.collapsed[id] = !state.collapsed[id];
  saveState();
  render();
}

function collapseAll() {
  Object.values(state.nodes).forEach(n => {
    if (getChildren(n.id).length > 0 && n.id !== state.rootId) {
      state.collapsed[n.id] = true;
    }
  });
  saveState();
  render();
}

function expandAll() {
  state.collapsed = {};
  saveState();
  render();
}

// -------- Default seed (PFi structure) --------
function seedDefault() {
  state = { nodes: {}, rootId: null, collapsed: {} };

  const md  = _createNode({ parentId: null, role: 'Managing Director' });
  const gm  = _createNode({ parentId: md,   role: 'General Manager' });
  const ops = _createNode({ parentId: gm,   role: 'Operations Manager' });
  const mpd = _createNode({ parentId: gm,   role: 'Major Projects Director' });
  const cfo = _createNode({ parentId: gm,   role: 'CFO' });

  _createNode({ parentId: ops, role: 'Capital Projects Manager' });
  _createNode({ parentId: ops, role: 'Asset Manager' });
  _createNode({ parentId: ops, role: 'Sales Manager' });
  _createNode({ parentId: ops, role: 'Mechanical Engineering Manager' });
  _createNode({ parentId: ops, role: 'Electrical and Controls Manager' });
  _createNode({ parentId: ops, role: 'IT Manager' });
  _createNode({ parentId: ops, role: 'Site Services Manager' });

  _createNode({ parentId: cfo, role: 'Finance Manager' });

  saveState();
}

// -------- Render --------
function render() {
  const chart = document.getElementById('chart');
  if (!state.rootId || !state.nodes[state.rootId]) {
    chart.innerHTML = renderEmptyState();
  } else {
    chart.innerHTML = renderNode(state.rootId);
  }
  updateHeaderStats();
  renderTierLegend();
}

function renderEmptyState() {
  return `
    <div class="empty-state">
      <div class="empty-eyebrow">Nothing here yet</div>
      <div class="empty-title">Start with <em>a root role</em></div>
      <div class="empty-text">Add the top-level role — Managing Director, CEO, whoever sits at the top — and build downward from there.</div>
      <div class="empty-actions">
        <button class="btn btn-primary" data-action="add-root">${ICONS.plus} Add root role</button>
        <button class="btn btn-outline" data-action="seed-default">Load PFi default</button>
      </div>
    </div>
  `;
}

function renderNode(id) {
  const node = state.nodes[id];
  if (!node) return '';
  const children = getChildren(id);
  const childCount = children.length;
  const isCollapsed = !!state.collapsed[id];
  const showChildren = childCount > 0 && !isCollapsed;

  return `
    <div class="node ${showChildren ? 'has-children' : ''}" data-id="${id}">
      <div class="card-wrap ${isCollapsed ? 'is-collapsed' : ''}">
        ${renderCard(node, childCount, isCollapsed)}
      </div>
      ${showChildren ? `
        <div class="children">
          ${children.map(c => renderNode(c.id)).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderCard(node, childCount, isCollapsed) {
  const color = tierColor(node.tier);
  const tierLabel = `Tier ${String(node.tier).padStart(2, '0')}`;
  const vacant = isVacant(node);
  const effectiveCount = effectiveDirectReports(node.id);
  const bubbled = !vacant && hasVacantDirectChild(node.id);
  const badgeTitle = bubbled
    ? `${effectiveCount} effective direct report${effectiveCount === 1 ? '' : 's'} \u2014 includes reports bubbled up from vacant position${getChildren(node.id).filter(k => isVacant(k)).length > 1 ? 's' : ''} below`
    : `${effectiveCount} direct report${effectiveCount === 1 ? '' : 's'}`;

  return `
    <div class="card ${isCollapsed ? 'is-collapsed' : ''} ${vacant ? 'is-vacant' : ''}"
         style="--tier-color: ${color}"
         data-id="${node.id}">
      <div class="card-header">
        <span class="card-tier">${tierLabel}${vacant ? ' \u00b7 <span class="tier-vacant">Vacant</span>' : ''}</span>
        <button class="card-menu-btn" data-action="toggle-menu" data-id="${node.id}" aria-label="Card actions">
          ${ICONS.menu}
        </button>
      </div>
      <div class="card-name ${!node.name ? 'is-empty' : ''}" data-action="edit" data-id="${node.id}" title="Click to edit">
        ${escapeHtml(node.name) || 'Click to add name'}
      </div>
      <div class="card-role" data-action="edit" data-id="${node.id}">
        ${escapeHtml(node.role) || '<span style="color:var(--silver)">— role —</span>'}
      </div>
      ${node.notes ? `
        <div class="card-notes" data-action="edit" data-id="${node.id}" title="Click to view / edit notes">
          ${ICONS.note}
          <span class="card-notes-text">${escapeHtml(node.notes)}</span>
        </div>
      ` : ''}
      ${openMenuId === node.id ? renderMenu(node) : ''}
      ${effectiveCount > 0 ? `
        <span class="card-reports-badge ${bubbled ? 'is-bubbled' : ''}" title="${badgeTitle}" aria-label="${badgeTitle}">${effectiveCount}</span>
      ` : ''}
    </div>
    ${childCount > 0 ? `
      <button class="card-collapse" data-action="collapse" data-id="${node.id}"
              title="${isCollapsed ? 'Expand ' + childCount + ' direct reports' : 'Collapse direct reports'}">
        ${isCollapsed ? '+' : '\u2212'}
      </button>
      ${isCollapsed ? `<span class="card-collapse-count">+${childCount} hidden</span>` : ''}
    ` : ''}
  `;
}

function renderMenu(node) {
  const canAddSibling = !!node.parentId;
  return `
    <div class="card-menu-dropdown" data-menu-for="${node.id}">
      <button class="menu-item" data-action="edit" data-id="${node.id}">${ICONS.edit} Edit details</button>
      <button class="menu-item" data-action="add-child" data-id="${node.id}">${ICONS.addChild} Add direct report</button>
      <button class="menu-item" data-action="add-sibling" data-id="${node.id}" ${canAddSibling ? '' : 'disabled'}>${ICONS.addSibling} Add peer at same tier</button>
      <div class="menu-divider"></div>
      <button class="menu-item danger" data-action="delete" data-id="${node.id}">${ICONS.trash} Delete role</button>
    </div>
  `;
}

function updateHeaderStats() {
  document.getElementById('stat-tiers').textContent = maxTier();
  document.getElementById('stat-roles').textContent = Object.keys(state.nodes).length;
}

function renderTierLegend() {
  const max = Math.max(maxTier(), 5);
  const legend = document.getElementById('tier-legend');
  const items = [];
  for (let i = 1; i <= max; i++) {
    items.push(`
      <span class="tier-pill">
        <span class="tier-pill-swatch" style="background:${tierColor(i)}"></span>
        Tier ${String(i).padStart(2, '0')}
      </span>
    `);
  }
  legend.innerHTML = items.join('');
}

// -------- Modal system --------
const modalOverlay = document.getElementById('modal-overlay');

function closeModal() {
  modalOverlay.classList.remove('is-open');
  modalOverlay.innerHTML = '';
}

function openEditModal(id) {
  const node = state.nodes[id];
  if (!node) return;
  const color = tierColor(node.tier);
  const tierLabel = `Tier ${String(node.tier).padStart(2, '0')}`;

  modalOverlay.innerHTML = `
    <div class="modal tier-themed" style="--modal-tier-color: ${color}">
      <div class="modal-header">
        <div class="modal-eyebrow">${tierLabel} · Edit role</div>
        <div class="modal-title">Edit role details</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="f-name">Name</label>
          <input class="form-input" id="f-name" type="text" placeholder="e.g. Jane Smith" value="${escapeHtml(node.name)}" autocomplete="off">
          <div class="form-help">Type <strong>"Position Vacant"</strong> to mark the seat empty &mdash; its team will count toward the manager above.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-role">Role / Title</label>
          <input class="form-input" id="f-role" type="text" placeholder="e.g. Operations Manager" value="${escapeHtml(node.role)}" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-notes">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Responsibilities, reporting lines, key projects, internal context…">${escapeHtml(node.notes)}</textarea>
          <div class="form-help">Free-form. Useful for capturing context that won't fit on the card.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="close-modal">Cancel</button>
        <button class="btn btn-primary" data-action="save-edit" data-id="${id}">Save changes</button>
      </div>
    </div>
  `;
  modalOverlay.classList.add('is-open');
  setTimeout(() => document.getElementById('f-name')?.focus(), 50);
}

function openAddModal({ parentId, type }) {
  const parent = parentId ? state.nodes[parentId] : null;
  const newTier = parent ? parent.tier + 1 : 1;
  let actualParentId = parentId;
  let title, eyebrow;

  if (type === 'sibling') {
    actualParentId = parent.parentId;
    const grandparent = state.nodes[actualParentId];
    title = 'Add peer at same tier';
    eyebrow = `Tier ${String(parent.tier).padStart(2, '0')} · Same tier as ${escapeHtml(parent.role || 'this role')}`;
  } else if (type === 'root') {
    actualParentId = null;
    title = 'Add root role';
    eyebrow = 'Tier 01 · Top of organisation';
  } else {
    title = 'Add direct report';
    eyebrow = `Tier ${String(newTier).padStart(2, '0')} · Reports to ${escapeHtml(parent.role || 'this role')}`;
  }

  const displayTier = type === 'sibling' ? parent.tier : (type === 'root' ? 1 : newTier);
  const color = tierColor(displayTier);

  modalOverlay.innerHTML = `
    <div class="modal tier-themed" style="--modal-tier-color: ${color}">
      <div class="modal-header">
        <div class="modal-eyebrow">${eyebrow}</div>
        <div class="modal-title">${title}</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="f-role">Role / Title</label>
          <input class="form-input" id="f-role" type="text" placeholder="e.g. Quality Manager" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-name">Name <span style="color:var(--silver); font-weight:500; text-transform:none; letter-spacing:0">(optional)</span></label>
          <input class="form-input" id="f-name" type="text" placeholder="e.g. Jane Smith" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-notes">Notes <span style="color:var(--silver); font-weight:500; text-transform:none; letter-spacing:0">(optional)</span></label>
          <textarea class="form-textarea" id="f-notes" placeholder="Responsibilities, reporting lines, key projects, internal context…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="close-modal">Cancel</button>
        <button class="btn btn-primary" data-action="save-add" data-parent-id="${actualParentId || ''}">Create role</button>
      </div>
    </div>
  `;
  modalOverlay.classList.add('is-open');
  setTimeout(() => document.getElementById('f-role')?.focus(), 50);
}

function openDeleteConfirm(id) {
  const node = state.nodes[id];
  if (!node) return;
  const descendants = getDescendantIds(id);
  const label = node.name ? `${node.name} (${node.role || 'Untitled role'})` : (node.role || 'Untitled role');

  modalOverlay.innerHTML = `
    <div class="modal confirm-modal">
      <div class="modal-header">
        <div class="modal-eyebrow" style="color: var(--danger)">Confirm deletion</div>
        <div class="modal-title">Delete this role?</div>
      </div>
      <div class="modal-body">
        <div class="confirm-message">
          You're about to delete <strong>${escapeHtml(label)}</strong>.
        </div>
        ${descendants.length > 0 ? `
          <div class="confirm-warning">
            This will also delete <strong>${descendants.length}</strong> ${descendants.length === 1 ? 'role reporting' : 'roles reporting'} downward from this position. This cannot be undone.
          </div>
        ` : `
          <div class="confirm-warning">This cannot be undone.</div>
        `}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="close-modal">Cancel</button>
        <button class="btn btn-danger" data-action="confirm-delete" data-id="${id}">Delete role</button>
      </div>
    </div>
  `;
  modalOverlay.classList.add('is-open');
}

function openResetConfirm() {
  modalOverlay.innerHTML = `
    <div class="modal confirm-modal">
      <div class="modal-header">
        <div class="modal-eyebrow" style="color: var(--danger)">Reset chart</div>
        <div class="modal-title">Reset to PFi default?</div>
      </div>
      <div class="modal-body">
        <div class="confirm-message">
          This will replace the current chart with the default PFi organisation structure (Managing Director → General Manager → Operations, Major Projects, CFO …).
        </div>
        <div class="confirm-warning">All current entries and notes will be lost.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="close-modal">Cancel</button>
        <button class="btn btn-danger" data-action="confirm-reset">Reset chart</button>
      </div>
    </div>
  `;
  modalOverlay.classList.add('is-open');
}

// -------- Modal save handlers --------
function saveEditFromModal(id) {
  const name = document.getElementById('f-name').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  updateNode(id, { name, role, notes });
  closeModal();
}

function saveAddFromModal(parentId) {
  const name = document.getElementById('f-name').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  if (!name && !role) {
    document.getElementById('f-role').focus();
    return;
  }
  addNode({ parentId: parentId || null, name, role, notes });
  closeModal();
}

// -------- Export / Import --------
function exportJson() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pfi-org-chart-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importJson(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.nodes || !parsed.rootId) throw new Error('Missing required fields (nodes / rootId).');
      state = {
        nodes: parsed.nodes,
        rootId: parsed.rootId,
        collapsed: parsed.collapsed || {}
      };
      saveState();
      render();
    } catch (err) {
      alert('Could not import file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// -------- Event delegation --------
document.addEventListener('click', (e) => {
  // Outside-menu clicks close the open dropdown
  const inMenu = e.target.closest('.card-menu-dropdown');
  const onMenuBtn = e.target.closest('[data-action="toggle-menu"]');
  if (openMenuId && !inMenu && !onMenuBtn) {
    openMenuId = null;
    render();
  }

  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const id = actionEl.dataset.id;

  switch (action) {
    case 'toggle-menu':
      e.stopPropagation();
      openMenuId = (openMenuId === id) ? null : id;
      render();
      break;

    case 'edit':
      // Card body clicks (name/role/notes) shouldn't fire when the menu button is clicked
      if (e.target.closest('[data-action="toggle-menu"]')) return;
      if (e.target.closest('.card-collapse')) return;
      openMenuId = null;
      openEditModal(id);
      break;

    case 'add-child':
      openMenuId = null;
      openAddModal({ parentId: id, type: 'child' });
      break;

    case 'add-sibling': {
      if (actionEl.disabled) return;
      const node = state.nodes[id];
      if (!node || !node.parentId) return;
      openMenuId = null;
      openAddModal({ parentId: id, type: 'sibling' });
      break;
    }

    case 'delete':
      openMenuId = null;
      openDeleteConfirm(id);
      break;

    case 'confirm-delete':
      deleteNode(id);
      closeModal();
      break;

    case 'collapse':
      e.stopPropagation();
      toggleCollapse(id);
      break;

    case 'close-modal':
      closeModal();
      break;

    case 'save-edit':
      saveEditFromModal(id);
      break;

    case 'save-add':
      saveAddFromModal(actionEl.dataset.parentId || null);
      break;

    case 'add-root':
      openAddModal({ parentId: null, type: 'root' });
      break;

    case 'seed-default':
      seedDefault();
      render();
      break;

    case 'expand-all':
      expandAll();
      break;

    case 'collapse-all':
      collapseAll();
      break;

    case 'export':
      exportJson();
      break;

    case 'import':
      document.getElementById('file-input').click();
      break;

    case 'reset':
      openResetConfirm();
      break;

    case 'confirm-reset':
      seedDefault();
      render();
      closeModal();
      break;
  }
});

// Close menus on overlay click (but not on modal content)
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (modalOverlay.classList.contains('is-open')) {
      closeModal();
    } else if (openMenuId) {
      openMenuId = null;
      render();
    }
  }
  // Cmd/Ctrl+Enter to submit form in modal
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && modalOverlay.classList.contains('is-open')) {
    const saveBtn = modalOverlay.querySelector('[data-action="save-edit"], [data-action="save-add"], [data-action="confirm-delete"], [data-action="confirm-reset"]');
    if (saveBtn) saveBtn.click();
  }
});

// File input
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) importJson(file);
  e.target.value = '';
});

// -------- Init --------
if (!loadState()) {
  seedDefault();
}
render();
</script>
